apiVersion: initree.dev/v1
id: docker
slot: container
name: Docker image
consumes:
  - { key: runtime.base_image, required: true }
  - { key: runtime.install_cmd, required: true }
  - { key: app.start_command, required: true }
  - { key: app.port, required: true }
  - { key: runtime.build_cmd, required: false }
  - { key: runtime.artifact, required: false }
  - { key: runtime.run_base_image, required: false }
provides:
  - { key: container.runtime, type: string }
  - { key: container.image_name, type: string }
  - { key: container.exposed_port, type: int }
  - { key: container.build_recipe, type: recipe }
  - { key: registry.host, type: string }
  - { key: registry.image_name_base, type: string }
owns:
  - "Dockerfile"
  - ".dockerignore"
