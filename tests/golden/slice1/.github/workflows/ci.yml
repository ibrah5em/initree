name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - run: uv sync
      - run: uv run pytest

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build and push image
        run: |
          docker login ghcr.io -u ${{ secrets.REGISTRY_USER }} -p ${{ secrets.REGISTRY }}
          docker build -t ghcr.io/your-org/myapp:${{ github.sha }} .
          docker push ghcr.io/your-org/myapp:${{ github.sha }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        run: |
          ssh deploy@example.com "docker pull ghcr.io/your-org/myapp:${{ github.sha }} && docker run -d --restart=always --name myapp -p 80:8000 ghcr.io/your-org/myapp:${{ github.sha }}"
