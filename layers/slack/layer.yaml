apiVersion: initree.dev/v1
id: slack
slot: notify
name: Slack deploy notification
description: A pure recipe provider — owns zero files, consumes the common deploy.summary optionally, and degrades gracefully when there is no deploy layer.

consumes:
  - { key: project.name, required: true }
  - { key: deploy.summary, required: false, default: "a new version" }
  - { key: deploy.url, required: false, default: "" }

provides:
  # Header written without a space after the colon so the rendered ci script line stays a plain YAML
  # scalar (no `: ` to be misread as a mapping); curl treats `Header:value` the same as `Header: value`.
  - key: notify.send_recipe
    type: recipe
    value:
      - "curl -sf -X POST -H 'Content-type:application/json' --data '{\"text\":\"✅ ${project.name} deployed — ${deploy.summary} ${deploy.url}\"}' {{SECRET:slack_webhook}}"

owns: []
