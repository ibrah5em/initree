apiVersion: initree.dev/v1
id: docker
slot: container
name: Docker image
description: Consumes the app.* contract, produces the container.* capability and a build recipe.

inputs:
  # registry.docker.owner is backend-private (docs/03 §6): it only shapes this layer's own
  # registry.image_name_base, never crossing to another layer. ghcr.io requires an owner segment
  # (ghcr.io/<owner>/<image>) — there's no way to derive it from the project name, so it's an input.
  - { key: registry.docker.owner, prompt: "Registry owner (GitHub org or user)", type: string, default: "your-org" }

consumes:
  - { key: runtime.base_image, required: true }      # FROM
  - { key: runtime.install_cmd, required: true }     # dependency install
  - { key: app.start_command, required: true }       # CMD
  - { key: app.port, required: true }                # EXPOSE
  - { key: runtime.build_cmd, required: false }      # compiled langs only; absent for python
  - { key: runtime.artifact, required: false }
  - { key: runtime.run_base_image, required: false }

provides:
  - { key: container.runtime, type: string, value: "docker" }
  - { key: container.image_name, type: string, value: "${project.slug}" }
  - { key: container.exposed_port, type: int, value: "${app.port}" }
  - { key: registry.host, type: string, value: "ghcr.io" }
  - { key: registry.image_name_base, type: string, value: "${registry.host}/${registry.docker.owner}/${project.slug}" }
  # Backend-agnostic build/push: ${...} is resolved at compute, {{...}} stays for the ci layer.
  - key: container.build_recipe
    type: recipe
    value:
      - "docker login ${registry.host} -u {{SECRET:registry_user}} -p {{SECRET:registry}}"
      - "docker build -t {{IMAGE}} ."
      - "docker push {{IMAGE}}"

owns:
  - "Dockerfile"
  - ".dockerignore"
