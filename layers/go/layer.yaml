apiVersion: initree.dev/v1
id: go
slot: language
name: Go module base
description: Owns go.mod and exposes the dependency injection point. Compiled, so it provides a build command, an artifact path, and a separate runtime base image for a multi-stage container.

inputs:
  - { key: runtime.version, prompt: "Go version", type: string, default: "1.22" }
  # runtime.go.entrypoint is backend-private (docs/03 §6): it derives runtime.build_cmd and is never
  # consumed by another layer.
  - { key: runtime.go.entrypoint, prompt: "main package path", type: string, default: "./cmd/server" }

provides:
  - { key: runtime.language, type: string, value: "go" }
  - { key: runtime.version, type: string, value: "${runtime.version}" }
  - { key: runtime.base_image, type: string, value: "golang:${runtime.version}" }            # build stage
  - { key: runtime.run_base_image, type: string, value: "gcr.io/distroless/static-debian12" } # final stage
  - { key: runtime.install_cmd, type: string, value: "go mod download" }
  - { key: runtime.build_cmd, type: string,
      value: "CGO_ENABLED=0 go build -o /out/server ${runtime.go.entrypoint}" }
  - { key: runtime.artifact, type: string, value: "/out/server" }

owns:
  - "go.mod"
  - ".gitignore"

injection_points:
  - id: runtime.dependencies
    file: go.mod
    format: text-block
    anchor: "require-block"
    order: declared
