name: Release

# Publish to PyPI when a version tag is pushed. Cut a release with:
#   git tag v0.1.0 && git push origin v0.1.0
# Auth is PyPI Trusted Publishing (OIDC) — no token stored. Configure the publisher once on PyPI
# (Project -> Publishing): owner ibrah5em, repo initree, workflow release.yml, environment pypi.
on:
  push:
    tags: ["v*"]

jobs:
  pypi:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write # mint the short-lived OIDC token PyPI trusts; nothing else needs write
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0

      - name: Build
        run: uv build

      - name: Check artifacts
        run: uvx twine check dist/*

      - name: Publish
        run: uv publish --trusted-publishing always
