name: Docs

on:
  push:
    branches: [main]
  pull_request:
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/docs.yml"
  workflow_dispatch: {}

# GitHub Pages allows one deploy at a time; queue rather than cancel a publish in flight.
concurrency:
  group: pages
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true

      # Only the docs group — not the project or dev deps. mkdocs build needs neither.
      - name: Sync docs deps
        run: uv sync --frozen --only-group docs

      # --strict turns broken links and orphaned pages into build failures, so a bad doc
      # fails the PR instead of shipping silently.
      - name: Build site
        run: uv run --no-sync mkdocs build --strict

      - name: Configure Pages
        if: github.event_name != 'pull_request'
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Deploy to Pages
        id: deploy
        uses: actions/deploy-pages@v4
