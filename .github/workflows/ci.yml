name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# A new push to a PR cancels the in-flight run for that ref — no point finishing stale checks.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --frozen

      # Mirrors the local pre-commit gate. Scoped to our source: src/tests plus the layer hooks,
      # which are real Python that runs at compute/finalize. Golden snapshots and layer templates
      # are excluded in pyproject — they hold ${...}/{{...}} placeholders, not valid source.
      - name: Format
        run: uv run ruff format --check src tests layers

      - name: Lint
        run: uv run ruff check src tests layers

      - name: Types
        run: uv run pyright

      - name: Tests
        run: uv run pytest
